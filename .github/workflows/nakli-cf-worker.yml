name: nakli-cf-worker

on:
  push:
    branches: [main]
    paths:
      - 'nakli-cf-worker/**'
      - '.github/workflows/nakli-cf-worker.yml'
  pull_request:
    paths:
      - 'nakli-cf-worker/**'
      - '.github/workflows/nakli-cf-worker.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Smoke test
        run: ./nakli-cf-worker/smoke.sh
