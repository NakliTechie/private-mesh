name: nakli-cf-worker

on:
  push:
    branches: [main]
    paths:
      - 'nakli-cf-worker/**'
      - '.github/workflows/nakli-cf-worker.yml'
  pull_request:
    paths:
      - 'nakli-cf-worker/**'
      - '.github/workflows/nakli-cf-worker.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Smoke test
        run: ./nakli-cf-worker/smoke.sh
