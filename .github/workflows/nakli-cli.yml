name: nakli-cli

on:
  push:
    branches: [main]
    paths:
      - 'nakli-cli/**'
      - '.github/workflows/nakli-cli.yml'
  pull_request:
    paths:
      - 'nakli-cli/**'
      - '.github/workflows/nakli-cli.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Smoke test
        run: ./nakli-cli/smoke.sh
