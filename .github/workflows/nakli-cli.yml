name: nakli-cli

on:
  push:
    branches: [main]
    paths:
      - 'nakli-cli/**'
      - '.github/workflows/nakli-cli.yml'
  pull_request:
    paths:
      - 'nakli-cli/**'
      - '.github/workflows/nakli-cli.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Smoke test
        run: ./nakli-cli/smoke.sh
