name: fabric-merge-helpers

on:
  push:
    branches: [main]
    paths:
      - 'fabric-merge-helpers/**'
      - '.github/workflows/fabric-merge-helpers.yml'
  pull_request:
    paths:
      - 'fabric-merge-helpers/**'
      - '.github/workflows/fabric-merge-helpers.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Smoke test
        run: ./fabric-merge-helpers/smoke.sh
