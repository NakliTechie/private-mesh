name: fabric-merge-helpers

on:
  push:
    branches: [main]
    paths:
      - 'fabric-merge-helpers/**'
      - '.github/workflows/fabric-merge-helpers.yml'
  pull_request:
    paths:
      - 'fabric-merge-helpers/**'
      - '.github/workflows/fabric-merge-helpers.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Smoke test
        run: ./fabric-merge-helpers/smoke.sh
