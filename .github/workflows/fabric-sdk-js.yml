name: fabric-sdk-js

on:
  push:
    branches: [main]
    paths:
      - 'fabric-sdk-js/**'
      - '.github/workflows/fabric-sdk-js.yml'
  pull_request:
    paths:
      - 'fabric-sdk-js/**'
      - '.github/workflows/fabric-sdk-js.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: Smoke test
        run: ./fabric-sdk-js/smoke.sh
