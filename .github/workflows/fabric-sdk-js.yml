name: fabric-sdk-js

on:
  push:
    branches: [main]
    paths:
      - 'fabric-sdk-js/**'
      - '.github/workflows/fabric-sdk-js.yml'
  pull_request:
    paths:
      - 'fabric-sdk-js/**'
      - '.github/workflows/fabric-sdk-js.yml'

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Smoke test
        run: ./fabric-sdk-js/smoke.sh
