name = "nakli-fabric"
main = "src/worker.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# R2 + KV are required bindings. The dev runtime simulates both locally; the
# deploy command swaps in real Cloudflare-managed resources by id (see README).
[[r2_buckets]]
binding = "BLOBS"
bucket_name = "nakli-fabric-blobs"

[[kv_namespaces]]
binding = "STATE"
id = "00000000000000000000000000000000"

# Single-flight redemption flag for CRATE-PAIR tokens. The DO instance
# (one per token, addressed by token secret) holds the atomic redeemed
# bit so two concurrent /pair/complete calls cannot both mint daemon
# capabilities for the same token. KV is not strongly consistent enough
# for this. See src/pair-redemption-do.ts for the rationale.
[[durable_objects.bindings]]
name = "PAIR_REDEMPTION"
class_name = "PairRedemption"

# DO migration — required when introducing a new DO class. Operators
# upgrading an existing deployment run `wrangler deploy` and the runtime
# provisions the new class. No state migration is needed (this is a
# fresh DO with no prior schema).
[[migrations]]
tag = "v1"
new_sqlite_classes = ["PairRedemption"]

[vars]
PROTOCOL_VERSION = "naklimesh/1.0"
MAX_EVENT_SIZE_BYTES = "1048576"
IDEMPOTENCY_RETENTION_SECONDS = "86400"
DISCHARGE_TTL_SECONDS = "86400"
LOG_LEVEL = "info"
# CONFORMANCE_MODE=true seeds the retired-agent principal at startup so the
# 32-test conformance suite can drive test 30. Leave unset in production.
CONFORMANCE_MODE = "false"

# HUB_ID, HUB_PUBLIC_KEY, HUB_PRIVATE_KEY, MACAROON_ROOT_KEY are set as
# secrets (production) or in .dev.vars (local). All base64.
